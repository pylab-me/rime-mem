name: Sync Repo

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - sync-repo

permissions:
  contents: write

concurrency:
  group: sync-repo-${{ github.ref }}
  cancel-in-progress: true

env:
  RIME_MEM_PRIVATE_REPO_TOKEN: ${{ secrets.RIME_MEM_PRI_TOKEN }}
  RIME_MEM_PRIVATE_REPO_SLUG: ${{ vars.RIME_MEM_PRIVATE_REPO_SLUG || 'pylab-me/rime-mem-pri' }}
  RIME_MEM_PRIVATE_REPO_REF: ${{ vars.RIME_MEM_PRIVATE_REPO_REF || 'main' }}

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Check private repo token
        run: |
          if [ -z "${RIME_MEM_PRIVATE_REPO_TOKEN}" ]; then
            echo "Missing secret: RIME_MEM_PRI_TOKEN"
            echo "This secret must have read access to ${RIME_MEM_PRIVATE_REPO_SLUG}"
            exit 1
          fi

      - name: Checkout private repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.RIME_MEM_PRIVATE_REPO_SLUG }}
          token: ${{ env.RIME_MEM_PRIVATE_REPO_TOKEN }}
          ref: ${{ env.RIME_MEM_PRIVATE_REPO_REF }}
          path: private-src
          fetch-depth: 1
          persist-credentials: false

      - name: Sync lua directory
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil

          src = Path("private-src/lua")
          dst = Path("lua")

          if not src.exists():
              raise SystemExit(f"lua source not found: {src}")

          if dst.exists():
              shutil.rmtree(dst)

          copied = 0
          for f in src.rglob("*.lua"):
              rel = f.relative_to(src)
              out = dst / rel
              out.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(f, out)
              copied += 1

          print(f"synced {copied} lua files -> {dst}")
          PY

      - name: Show changes
        run: |
          git status --short
          find lua -type f | sort || true

      - name: Read crate version
        id: crate_version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path
          import tomllib

          cargo_toml = Path("private-src/rime_mem/Cargo.toml")
          data = tomllib.loads(cargo_toml.read_text(encoding="utf-8"))
          print(f"version={data['package']['version']}")
          PY

      - name: Commit changes
        id: commit
        run: |
          if [ -z "$(git status --porcelain -- lua)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No lua changes detected."
            exit 0
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add lua
          git commit -m "chore(lua): sync from ${RIME_MEM_PRIVATE_REPO_SLUG}@${{ steps.crate_version.outputs.version }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push changes
        if: steps.commit.outputs.changed == 'true'
        run: git push origin HEAD:${{ github.ref_name }}
